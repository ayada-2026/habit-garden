<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5eddc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="작은 습관 정원">
  <title>Habit Garden</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="./assets/icons/favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="home-shell">
    <section class="screen-frame">
      <div class="ambient ambient-top"></div>
      <div class="ambient ambient-bottom"></div>

      <section id="headerHero" aria-label="헤더 히어로"></section>
      <section id="gardenStatus" aria-label="오늘의 정원 상태"></section>

      <section class="habit-zone" aria-labelledby="habitSectionTitle">
        <div id="habitSectionHeader"></div>
        <div class="habit-list" id="habitList"></div>
      </section>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
