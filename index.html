<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5ede2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="작은 습관 정원">
  <title>Habit Garden v2</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="./assets/icons/favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <div class="ambient ambient-top"></div>
    <div class="ambient ambient-bottom"></div>

    <section id="heroMount" aria-label="헤더 카드"></section>
    <section id="statusMount" aria-label="오늘의 정원 상태"></section>

    <section class="section-block" aria-labelledby="habitSectionTitle">
      <div id="habitHeaderMount"></div>
      <div class="habit-list" id="habitListMount"></div>
    </section>

    <section class="section-block" aria-labelledby="composerSectionTitle">
      <div id="composerMount"></div>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
